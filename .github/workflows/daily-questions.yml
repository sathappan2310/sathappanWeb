name: Daily SkillNest Questions

# Adds fresh, role-aware interview questions every day and commits them straight
# to main so the hosting provider (e.g. Vercel) auto-deploys with zero manual steps.
# Uses GitHub Models (free, via the built-in GITHUB_TOKEN) — no external API key required.
# To use OpenAI instead, add an OPENAI_API_KEY repository secret.

on:
  schedule:
    - cron: '17 3 * * *' # every day at 03:17 UTC (08:47 IST)
  workflow_dispatch:
    inputs:
      count:
        description: 'How many questions to add'
        required: false
        default: '5'
      tech:
        description: 'Optional technology id to target (blank = auto pick)'
        required: false
        default: ''

permissions:
  contents: write
  models: read # required for GitHub Models

concurrency:
  group: daily-questions
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate questions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKILLNEST_MAX_TARGET: '40'
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          TECH="${{ github.event.inputs.tech }}"
          if [ -n "$TECH" ]; then
            node scripts/generate-questions.mjs --tech "$TECH" --count "$COUNT"
          else
            node scripts/generate-questions.mjs --auto --count "$COUNT"
          fi

      - name: Validate JSON banks
        run: |
          node -e "const fs=require('fs');const d='lib/skillnest/data/questions';let bad=0;for(const f of fs.readdirSync(d)){const a=JSON.parse(fs.readFileSync(d+'/'+f,'utf8'));const ids=new Set(a.map(q=>q.id));for(const q of a)for(const r of (q.relatedQuestions||[]))if(!ids.has(r)){bad++}}if(bad){console.error('bad refs',bad);process.exit(1)}console.log('banks valid')"

      - name: Commit & push to main
        run: |
          git config user.name "skillnest-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/skillnest/data
          if git diff --cached --quiet; then
            echo "No new questions were produced today — nothing to commit."
            exit 0
          fi
          git commit -m "chore(skillnest): add daily interview questions [skip ci]"
          git push origin HEAD:main
